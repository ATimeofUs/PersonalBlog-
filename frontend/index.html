<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="static/my_css.css">
  <title>Ping 的个人网站</title>
</head>

<body>
  <script type="module" src="static/my_js.js"></script>

  <header>
    <h1>
      <span>ping's blog</span>
    </h1>
  </header>
  <nav>
    <ul>
      <li><a href="#" data-page="home" class="active">首页</a></li>
    </ul>

    <form id="loginForm">
      <input type="text" id="username" placeholder="用户名" required>
      <input type="password" id="password" placeholder="密码" required>
      <button type="submit" id="submitBtn">登录</button>
    </form>
  </nav>

  <main>
    <article>
      <h2>欢迎来到我的博客</h2>
      <p>这是我的第一篇博客文章。</p>
    </article>

    <section>
      <h2>关于我</h2>
      <p>我是一个热爱编程和分享的人，喜欢写博客记录我的学习和生活。</p>
    </section>

    <aside>
      <h2>最新文章</h2>
      <ul>
        <li><a href="#">如何学习 Python</a></li>
        <li><a href="#">我的编程之路</a></li>
        <li><a href="#">分享一些有用的资源</a></li>
      </ul>
    </aside>

    <p>
      <input type="text" id="test_input" placeholder="输入一些内容...">
    </p>
  </main>

  <footer>
    <p>&copy; Ping 的个人网站. 保留所有权利.</p>
  </footer>

</body>

</html>
